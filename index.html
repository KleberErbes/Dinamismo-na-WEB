<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataHub — JSONPlaceholder Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="logo">Data2<span>Hub</span></div>
  <div class="status-bar">
    <div class="dot"></div>
    <span>JSONPlaceholder API</span>
  </div>
</header>

<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('posts', this)">📄 Posts</button>
    <button class="tab-btn" onclick="switchTab('users', this)">👤 Usuários</button>
  </div>

  <!-- ══ POSTS TAB ══ -->
  <div id="tab-posts" class="tab-panel active">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total de Posts</div>
        <div class="stat-value" id="stat-posts">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Adicionados</div>
        <div class="stat-value" id="stat-added" style="color:var(--green)">0</div>
      </div>
    </div>

            <div>
                
            </div>
            
        </section>
    </main>
        <script src="script.js"></script>
</body>
</html>
