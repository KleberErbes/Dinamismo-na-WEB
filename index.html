<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dinamismo na WEB — JSONPlaceholder Explore</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <header>
        <h1 class="logo">Dinamismo na<span> WEB</span></h1>
        <div class="status-bar">
            <div class="dot"></div>
            <span>JSONPlaceholder API</span>
        </div>
    </header>

    <main class="container">

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('posts', this)">📄 Posts</button>
            <button class="tab-btn" onclick="switchTab('users', this)">👤 Usuários</button>
        </nav>

        <section id="tab-posts" class="tab-panel active">

            <section class="stats">
                <article class="stat-card">
                    <div class="stat-label">Posts</div>
                    <div class="stat-value" id="stat-posts">—</div>
                </article>

                <article class="stat-card">
                    <div class="stat-label">Adicionados</div>
                    <div class="stat-value" id="stat-added" style="color:var(--green)">0</div>
                </article>
            </section>

        </section>

    </main>
    
    <script src="script.js"></script>
</body>
</html>
